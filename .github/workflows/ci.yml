name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: package/backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r package/backend/requirements.txt -e clients/python pip-audit
      - name: Run backend tests
        env:
          PYTHONPATH: package/backend
        run: python -m unittest discover -s package/backend/tests -p "test_*.py" -v
      - name: Run Agent client tests
        run: python -m unittest discover -s clients/python/tests -p "test_*.py" -v
      - name: Check Agent CLI entry point
        run: wenheng --help
      - name: Audit Python dependencies
        run: pip-audit -r package/backend/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build production image
        run: |
          docker build \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --tag wenheng-workspace:ci \
            --file package/Dockerfile \
            .
