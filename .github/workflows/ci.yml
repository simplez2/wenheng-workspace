name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: package/backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r package/backend/requirements.txt pip-audit
      - name: Run backend tests
        env:
          PYTHONPATH: package/backend
        run: python -m unittest discover -s package/backend/tests -p "test_*.py" -v
      - name: Audit Python dependencies
        run: pip-audit -r package/backend/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: package/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
